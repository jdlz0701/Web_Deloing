<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16213e"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <linearGradient id="accent" x1="24" y1="20" x2="72" y2="76" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5eead4"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- plate -->
  <rect width="96" height="96" rx="22" fill="url(#bg)"/>
  <rect x="0.6" y="0.6" width="94.8" height="94.8" rx="21.4" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- D monogram as a route arc -->
  <path d="M30 24 H46 C61.5 24 72 34.7 72 48 C72 61.3 61.5 72 46 72 H30 Z"
        fill="none" stroke="url(#accent)" stroke-width="7" stroke-linejoin="round"/>

  <!-- inner negative-space counter -->
  <path d="M42 38 H46 C52 38 56 42.5 56 48 C56 53.5 52 58 46 58 H42 Z"
        fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="3"/>

  <!-- route nodes -->
  <circle cx="30" cy="24" r="4.5" fill="#5eead4"/>
  <circle cx="30" cy="72" r="4.5" fill="#38bdf8"/>
  <circle cx="72" cy="48" r="3.5" fill="#ffffff"/>
</svg>
